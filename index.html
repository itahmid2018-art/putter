<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Putter - itahmid2018-art</title>
    <style>
        :root {
            --primary: #2d3748;
            --secondary: #4a5568;
            --accent: #4299e1;
            --light: #f7fafc;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--primary);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        
        header {
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: var(--shadow);
        }
        
        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        
        header p {
            margin: 0.5rem 0 0;
            opacity: 0.9;
        }
        
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        }
        
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }
        
        .card-content {
            padding: 1.5rem;
        }
        
        .card-content h2 {
            margin: 0 0 0.5rem;
            font-size: 1.25rem;
            color: var(--primary);
        }
        
        .card-content p {
            margin: 0;
            color: var(--secondary);
            font-size: 0.9rem;
        }
        
        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--secondary);
            font-size: 0.9rem;
        }
        
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Putter</h1>
        <p>A collection of HTML projects by itahmid2018-art</p>
    </header>
    
    <div class="container">
        <div class="grid">
            <!-- Add your HTML file links here as cards -->
            <!-- Example: -->
            <a href="putter_code.html" class="card">
                <img src="https://via.placeholder.com/400x225?text=File+1" alt="File 1 Thumbnail">
                <div class="card-content">
                    <h2>File 1</h2>
                    <p>Description of File 1</p>
                </div>
            </a>
            
            <a href="putter_agent.html" class="card">
                <img src="https://via.placeholder.com/400x225?text=File+2" alt="File 2 Thumbnail">
                <div class="card-content">
                    <h2>File 2</h2>
                    <p>Description of File 2</p>
                </div>
            </a>

            <a href="putter_image.html" class="card">
                <img src="https://via.placeholder.com/400x225?text=File+3" alt="File 2 Thumbnail">
                <div class="card-content">
                    <h2>File 2</h2>
                    <p>Description of File 2</p>
                </div>
            </a>
            
            <!-- Add more cards for each HTML file in your repo -->
        </div>
    </div>
    
    <footer>
        <p>&copy; 2026 itahmid2018-art. All rights reserved.</p>
    </footer>
</body>
</html>
